<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Estereo Color | App Oficial</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 📦 CONTENEDOR CENTRAL (IMPORTANTE) -->
<div class="app-container">

  <!-- 🔴 TOP BAR -->
  <header class="topbar">
    <div class="logo">🎙 REC LIVE</div>
    <div class="status">🔴 ON AIR</div>
  </header>

  <!-- 🎧 PLAYER -->
  <div class="player-bar">
    <button id="playBtn">▶ Play</button>

    <div class="now-playing">
      Radio Estereo Color - En Vivo 24/7
    </div>

    <div id="listeners">🌍 Señal activa</div>
  </div>

  <!-- 🔥 HERO -->
  <section class="hero">
    <h1>Radio Estereo Color</h1>
    <p>Transmitiendo desde Honduras para el mundo</p>

    <!-- 📊 CONTADOR -->
    <div id="visitas">Cargando visitas...</div>
  </section>

  <!-- 💬 CHAT -->
  <section class="chat">
    <iframe src="https://www3.cbox.ws/box/?boxid=3519381&boxtag=MvJDBl"></iframe>
  </section>

  <!-- 🔻 FOOTER -->
  <footer>
    <p>© 2026 Radio Estereo Color - Todos los derechos reservados</p>
  </footer>

</div>

<!-- 🔊 AUDIO OCULTO -->
<audio id="radioStream">
  <source src="https://stream.zeno.fm/m1q2mswvmmbvv" type="audio/mpeg">
</audio>

<!-- 🔥 SCRIPTS (ORDEN IMPORTANTE) -->
<script type="module" src="firebase.js"></script>
<script src="player.js"></script>

</body>
</html>
